version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: agent_eval_db
    restart: always
    environment:
      POSTGRES_DB: agent_eval
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: agent_eval_redis
    restart: always
    ports:
      - "6379:6379"

  web:
    build: .
    container_name: agent_eval_web
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/agent_eval
      - REDIS_URL=redis://redis:6379/0
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OLLAMA_HOST=http://host.docker.internal:11434
    volumes:
      - ./backend:/app/backend
      - ./frontend:/app/frontend
    depends_on:
      - db
      - redis

  worker:
    build: .
    container_name: agent_eval_worker
    restart: always
    command: celery -A backend.app.celery_app.celery_app worker --loglevel=info
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/agent_eval
      - REDIS_URL=redis://redis:6379/0
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OLLAMA_HOST=http://host.docker.internal:11434
    volumes:
      - ./backend:/app/backend
    depends_on:
      - db
      - redis

volumes:
  postgres_data:
